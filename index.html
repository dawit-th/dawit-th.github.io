<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Title</title>
    <meta property="og:image" content="URL_TO_YOUR_IMAGE" /> <!-- Open Graph image meta tag -->
    <meta name="copyright" content="Copyright © 2026"> <!-- Updated copyright year -->
</head>
<body>
    <nav>
        <div class="hamburger-menu">
            <!-- Hamburger icon for mobile navigation -->
        </div>
        <!-- Navigation links -->
    </nav>

    <button onclick="downloadResume()">Download Resume</button> <!-- Functional Resume download button -->

    <form id="contact-form" onsubmit="return validateForm();">
        <input type="text" aria-label="Your Name" placeholder="Your Name" required>
        <input type="email" aria-label="Your Email" placeholder="Your Email" required>
        <button type="submit">Submit</button>
    </form>

    <script>
        function downloadResume() {
            window.location.href = 'URL_TO_YOUR_RESUME'; // Make button functional
        }
        function validateForm() {
            const form = document.getElementById('contact-form');
            // Perform validation to prevent empty submissions
            if (!form.checkValidity()) {
                alert('Please fill out all fields.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
